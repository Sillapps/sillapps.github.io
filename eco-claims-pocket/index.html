<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eco Claims Pocket</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f4ee;
        --surface: #fffdf8;
        --text: #1f2b24;
        --muted: #59645d;
        --border: #d9d3c3;
        --link: #1d5c42;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        line-height: 1.6;
        background: linear-gradient(180deg, #f9f7f1 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        width: min(760px, calc(100% - 32px));
        margin: 48px auto;
        padding: 32px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
      }

      h1 {
        margin-top: 0;
        line-height: 1.2;
      }

      p {
        max-width: 65ch;
      }

      a {
        color: var(--link);
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Eco Claims Pocket</h1>
      <p>
        This site provides the public legal page for the mobile app
        <strong>Eco Claims Pocket</strong>.
      </p>
      <p>
        It is intended to support the app listing and compliance requirements for
        Google Play.
      </p>
      <p>
        <a href="privacy.html">Read the Privacy Policy</a>
      </p>
    </main>
  </body>
</html>
